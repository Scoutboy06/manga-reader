<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="apple-touch-icon" href="/img/rikka_square512.png">
	<link rel="shortcut icon" href="/img/rikka_square128.png" type="image/png">
	<meta name="description" content="Elias personal manga reader">
	<meta name="theme-color" content="#2596be">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="#121212">
	<meta name="apple-mobile-web-app-title" content="Manga Reader">
	<meta name="msapplication-TileImage" content="/img/rikka_square512.png">
	<meta name="msapplication-TileColor" content="#000">

	<title>Choose a Manga</title>

	<link rel="manifest" href="/manifest.json">
	
	<script>
		if('serviceWorker' in navigator) {
			navigator.serviceWorker.register('/sw.js');
		}
	</script>

	<link rel="stylesheet" href="/css/page.css" type="text/css">

</head>
<body>
	<header>
		<h2 id="title"></h2>

		<div class="container" style="margin-bottom: 30px">
			<a href="#" target="_blank" rel="nofollow noreferrer noopener" class="pagination" id="originBtn" disabled="true">
				<img src="/icons/open_in_new_white_24dp.svg" alt="Open original">
			</a>
		</div>

		<div class="container">

			<div class="pagination backBtn" disabled="true">
				<img src="/icons/arrow_back-white-24dp.svg" alt="<-">
				<span>Prev</span>
			</div>

			<a href="/" class="pagination" id="homeBtn">
				<img src="/icons/home-white-24dp.svg" alt="Home">
			</a>

			<div class="pagination nextBtn" disabled="true">
				<span>Next</span>
				<img src="/icons/arrow_forward-white-24dp.svg" alt="->">
			</div>

		</div>
	</header>



	<div id="root"></div>


	<header>
		<div class="container">

			<div class="pagination backBtn" disabled="true">
				<img src="/icons/arrow_back-white-24dp.svg" alt="<-">
				<span>Prev</span>
			</div>

			<a href="/" class="pagination" id="homeBtn">
				<img src="/icons/home-white-24dp.svg" alt="Home">
			</a>

			<div class="pagination nextBtn" disabled="true">
				<span>Next</span>
				<img src="/icons/arrow_forward-white-24dp.svg" alt="->">
			</div>

		</div>
	</header>

	</div>
	

	<script src="/js/page.js"></script>
</body>
</html>
